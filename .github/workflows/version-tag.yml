name: Version Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to tag, for example 0.1.0 or v0.1.0"
        required: true
      ref:
        description: "Branch, tag, or SHA to tag"
        required: true
        default: "main"
      message:
        description: "Annotated tag message"
        required: false

permissions:
  contents: write

jobs:
  create-tag:
    name: Create GitHub version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver, for example 0.1.0 or v0.1.0" >&2
            exit 1
          fi

          tag="v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin" >&2
            exit 1
          fi

          node scripts/set-app-version.mjs "$version" --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          message="${INPUT_MESSAGE:-OmniTool $tag}"
          git tag -a "$tag" -m "$message"
          git push origin "$tag"

          echo "Created and pushed $tag"
