# CI Pipeline — runs on every PR and push to main
# Validates code quality (lint, typecheck) and build integrity.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same PR/branch to save resources
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for Prisma generate during build
  DATABASE_URL: ***REMOVED***
  # Dummy auth secret so Next.js build doesn't fail on missing env
  AUTH_SECRET: "ci-placeholder-secret-not-for-production"
  AUTH_URL: "http://localhost:3000"
  # Use standalone output for production-like builds
  NEXT_OUTPUT: "standalone"

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # PostgreSQL service container — required for Prisma generate/validate
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnitool
        ports:
          - 5432:5432
        # Health checks ensure Postgres is ready before jobs run
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so caching works
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Run lint and typecheck in parallel using turbo's built-in parallelism
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Vitest unit + harness tests (lib/**, trpc/**, e2e/tests/**).
      # Includes the OAuth-mock harness smoke + tauri.ts mockIPC suite.
      - name: Unit tests
        run: pnpm --filter @omnitool/web test

  rust-tests:
    name: Rust unit tests (Tauri shell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for Tauri build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

  e2e-mac:
    # Optional macOS E2E job — runs Playwright against a built sidecar
    # plus the deep-link smoke. Gated on a label so we don't burn macOS
    # runner minutes on every PR; trigger by adding the `e2e` label or
    # pushing to main.
    name: macOS E2E (Playwright + deep-links)
    runs-on: macos-14
    timeout-minutes: 30
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    needs: ci
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL || '***REMOVED***' }}
      AUTH_SECRET: "ci-placeholder-secret-not-for-production"
      AUTH_URL: "http://localhost:19283"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @omnitool/web exec playwright install --with-deps chromium

      - name: Build sidecar
        run: pnpm --filter @omnitool/web build
        env:
          NEXT_OUTPUT: "standalone"

      - name: Start sidecar
        run: |
          PORT=19283 node apps/web/.next/standalone/apps/web/server.js &
          for i in {1..30}; do
            curl -fs http://localhost:19283/api/health && break || sleep 1
          done

      - name: Playwright tests
        run: pnpm --filter @omnitool/web exec playwright test --config=e2e/playwright/playwright.config.ts
        env:
          BASE_URL: "http://localhost:19283"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
