# CI Pipeline — runs on every PR and push to main
# Validates code quality (lint, typecheck) and build integrity.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same PR/branch to save resources
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for Prisma generate during build
  DATABASE_URL: ***REMOVED***
  # Dummy auth secret so Next.js build doesn't fail on missing env
  AUTH_SECRET: "ci-placeholder-secret-not-for-production"
  AUTH_URL: "http://localhost:3000"
  # Use standalone output for production-like builds
  NEXT_OUTPUT: "standalone"

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # PostgreSQL service container — required for Prisma generate/validate
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnitool
        ports:
          - 5432:5432
        # Health checks ensure Postgres is ready before jobs run
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so caching works
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Run lint and typecheck in parallel using turbo's built-in parallelism
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Vitest unit + harness tests (lib/**, trpc/**, e2e/tests/**).
      # Includes the OAuth-mock harness smoke + tauri.ts mockIPC suite.
      - name: Unit tests
        run: pnpm --filter @omnitool/web test

  migration-drift:
    # Surfaces drift between `packages/database/prisma/schema.prisma` and the
    # migration history. Currently advisory (continue-on-error) because the
    # main branch has known drift — `db:push` was used historically. Once a
    # fresh baseline migration captures the current schema, drop
    # `continue-on-error` so this becomes a hard gate.
    name: Migration drift (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnitool_shadow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect schema drift
        working-directory: packages/database
        env:
          SHADOW_URL: "postgresql://postgres:postgres@localhost:5433/omnitool_shadow?schema=public"
        run: |
          set +e
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "$SHADOW_URL" \
            --exit-code
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "Migrations match schema."
            exit 0
          elif [ "$status" -eq 2 ]; then
            echo "::warning::Schema drift detected: prisma/schema.prisma has changes not captured by any migration. Run 'pnpm --filter @omnitool/database exec prisma migrate dev' locally and commit the new migration."
            exit 1
          else
            echo "::error::prisma migrate diff failed with status $status"
            exit "$status"
          fi

  rust-tests:
    name: Rust unit tests (Tauri shell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for Tauri build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

  e2e-mac:
    # Optional macOS E2E job — runs Playwright against a built sidecar
    # plus the deep-link smoke. Gated on a label so we don't burn macOS
    # runner minutes on every PR; trigger by adding the `e2e` label or
    # pushing to main.
    name: macOS E2E (Playwright + deep-links)
    runs-on: macos-14
    timeout-minutes: 30
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    needs: ci
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL || '***REMOVED***' }}
      AUTH_SECRET: "ci-placeholder-secret-not-for-production"
      AUTH_URL: "http://localhost:19283"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      # Layer 4 OAuth E2E points the sidecar's GitHub URLs at the mock harness
      # so server-side fetches during the callback hit a deterministic
      # local responder (apps/web/e2e/harness/oauth-mock.ts on :5556).
      OAUTH_MOCK_PORT: "5556"
      GITHUB_OAUTH_BASE_URL: "http://localhost:5556"
      GITHUB_API_BASE_URL: "http://localhost:5556/api"
      GITHUB_CLIENT_ID: "ci-mock-github-client-id"
      GITHUB_CLIENT_SECRET: "ci-mock-github-client-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.27.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @omnitool/web exec playwright install --with-deps chromium

      - name: Build sidecar
        run: pnpm --filter @omnitool/web build
        env:
          NEXT_OUTPUT: "standalone"

      - name: Start sidecar
        run: |
          PORT=19283 node apps/web/.next/standalone/apps/web/server.js &
          for i in {1..30}; do
            curl -fs http://localhost:19283/api/health && break || sleep 1
          done

      - name: Playwright tests
        run: pnpm --filter @omnitool/web exec playwright test --config=e2e/playwright/playwright.config.ts
        env:
          BASE_URL: "http://localhost:19283"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
