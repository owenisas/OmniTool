<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="OmniTool app icon">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- Orbital ring — thinner, more elegant -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#f8fafc" stroke-width="28" stroke-opacity="0.5"/>

  <!-- Four orbital nodes at diagonal positions — each tool domain -->
  <circle cx="157" cy="157" r="32" fill="#f8fafc"/>
  <circle cx="355" cy="157" r="32" fill="#f8fafc"/>
  <circle cx="355" cy="355" r="32" fill="#f8fafc"/>
  <circle cx="157" cy="355" r="32" fill="#f8fafc"/>

  <!-- Center hub — the unifying core, accented -->
  <circle cx="256" cy="256" r="52" fill="#38bdf8"/>
</svg>
